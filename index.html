<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photobooth Experience</title>
    <meta name="description" content="A sleek web‑based photobooth that captures images from your webcam and lets you download the result instantly." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Photobooth</h1>
        <div class="camera-wrapper">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" width="640" height="480"></canvas>
            <p class="placeholder" id="placeholder">Press "Capture" to take a photo</p>
        </div>
        <div class="controls">
            <button id="captureBtn" class="btn primary">Capture</button>
            <button id="resetBtn" class="btn neutral hidden">Retake</button>
            <span id="timeDisplay" class="time-label hidden"></span>
            <a id="downloadLink" class="btn secondary hidden" download="photo.png">Download</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
