<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PHOTOBOOTH TRE-PAGI A</title>
    <meta name="description" content="Premium class photobooth with 8 layouts, 8 decorative templates, customized typography, and automated pose-by-pose countdowns." />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Satisfy&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app-container">
        <!-- Sidebar for Settings -->
        <aside class="sidebar">
            <!-- 1. Layout Selector Section (8 Options) -->
            <div class="settings-section">
                <h2>1. Choose Photo Layout</h2>
                <div class="layout-selector">
                    <button class="layout-card active" data-layout="four-cuts">
                        <div class="layout-icon strip-4">
                            <span></span><span></span><span></span><span></span>
                        </div>
                        <span>4-Cuts Strip</span>
                    </button>
                    <button class="layout-card" data-layout="grid-2x2">
                        <div class="layout-icon grid-4">
                            <span></span><span></span><span></span><span></span>
                        </div>
                        <span>2x2 Classic</span>
                    </button>
                    <button class="layout-card" data-layout="three-cuts">
                        <div class="layout-icon strip-3">
                            <span></span><span></span><span></span>
                        </div>
                        <span>3-Cuts Strip</span>
                    </button>
                    <button class="layout-card" data-layout="single-shot">
                        <div class="layout-icon single-1">
                            <span></span>
                        </div>
                        <span>Single Portrait</span>
                    </button>
                    
                    <!-- NEW ADVANCED LAYOUTS -->
                    <button class="layout-card" data-layout="combo-grid">
                        <div class="layout-icon combo-4">
                            <span class="big"></span>
                            <div class="row"><span></span><span></span><span></span></div>
                        </div>
                        <span>1 Big + 3 Small</span>
                    </button>
                    <button class="layout-card" data-layout="grid-2x3">
                        <div class="layout-icon grid-6">
                            <span></span><span></span><span></span><span></span><span></span><span></span>
                        </div>
                        <span>2x3 Grid (6 Poses)</span>
                    </button>
                    <button class="layout-card" data-layout="double-landscape">
                        <div class="layout-icon landscape-2">
                            <span></span><span></span>
                        </div>
                        <span>2 Wide Landscape</span>
                    </button>
                    <button class="layout-card" data-layout="double-portrait">
                        <div class="layout-icon portrait-2">
                            <span></span><span></span>
                        </div>
                        <span>2 Narrow Portrait</span>
                    </button>
                </div>
            </div>

            <!-- 2. Frame Design Selector Section (8 Options) -->
            <div class="settings-section">
                <h2>2. Select Frame Design</h2>
                <div class="template-selector">
                    <button class="template-card active" data-template="polaroid">
                        <div class="template-preview polaroid"></div>
                        <span>Classic Polaroid</span>
                    </button>
                    <button class="template-card" data-template="pastel">
                        <div class="template-preview pastel"></div>
                        <span>Sweet Pastel</span>
                    </button>
                    <button class="template-card" data-template="cyberpunk">
                        <div class="template-preview cyberpunk"></div>
                        <span>Neon Cyberpunk</span>
                    </button>
                    <button class="template-card" data-template="minimalist">
                        <div class="template-preview minimalist"></div>
                        <span>Elegant Minimal</span>
                    </button>
                    
                    <!-- NEW PREMIUM BINGKAI -->
                    <button class="template-card" data-template="cherry">
                        <div class="template-preview cherry"></div>
                        <span>Sakura Blossom</span>
                    </button>
                    <button class="template-card" data-template="filmstrip">
                        <div class="template-preview filmstrip"></div>
                        <span>Vintage Filmstrip</span>
                    </button>
                    <button class="template-card" data-template="vaporwave">
                        <div class="template-preview vaporwave"></div>
                        <span>80s Vaporwave</span>
                    </button>
                    <button class="template-card" data-template="y2k">
                        <div class="template-preview y2k"></div>
                        <span>Y2K Starry Dream</span>
                    </button>
                </div>
            </div>
            
            <!-- 3. Caption Customization Section -->
            <div class="settings-section">
                <h2>3. Custom Caption</h2>
                <div class="customization">
                    <input type="text" id="captionInput" value="TRE-PAGI A" placeholder="Add custom text..." maxlength="20" />
                </div>
            </div>
        </aside>

        <!-- Main Photobooth View -->
        <main class="main-booth">
            <header>
                <h1>📸 PHOTOBOOTH TRE-PAGI A</h1>
                <p>Semangat pagi Teknologi Rekayasa Elektronika! Yuk abadikan momen kelasmu!</p>
            </header>

            <div class="booth-container">
                <!-- Camera view & overlay effects -->
                <div class="camera-wrapper">
                    <!-- Live Camera Feed -->
                    <video id="video" autoplay playsinline></video>
                    
                    <!-- Captured Canvas (Hidden/Displayed programmatically) -->
                    <canvas id="canvas"></canvas>
                    
                    <!-- Countdown Overlay -->
                    <div id="countdownOverlay" class="countdown-overlay hidden">
                        <div class="countdown-content">
                            <span id="poseIndicator" class="pose-indicator">POSE 1 OF 4</span>
                            <span id="countdownText">3</span>
                        </div>
                    </div>

                    <!-- Camera Flash Effect -->
                    <div id="flashOverlay" class="flash-overlay"></div>
                </div>

                <!-- Custom Info Badge (Dynamic status display) -->
                <div id="statusBadge" class="status-badge">Ready to Shoot</div>
            </div>

            <!-- Photobooth Controls -->
            <div class="controls">
                <button id="captureBtn" class="btn primary-btn">
                    <span class="icon">⚡</span> Start Capture
                </button>
                <button id="resetBtn" class="btn neutral-btn hidden">
                    <span class="icon">🔄</span> Take Another
                </button>
                <a id="downloadLink" class="btn success-btn hidden" download="my_photostrip.png">
                    <span class="icon">💾</span> Save Strip
                </a>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
